<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Goodreads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
</head>

<body>

    <div id="setup-screen" class="screen active">
        <div class="setup-container glass-card">
            <h1>Welcome.</h1>
            <p>Connect your Goodreads account to view your library.</p>

            <div class="input-group">
                <label for="user-id-input">Goodreads User ID</label>
                <input type="text" id="user-id-input" placeholder="e.g. 12345678">
                <small>You can find this in your Goodreads profile URL.</small>
            </div>

            <button id="save-settings-btn" class="primary-btn">Connect Account</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <header>
            <h1>My Library</h1>
            <button id="logout-btn" class="icon-btn" aria-label="Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z">
                    </path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-target="read">Read</button>
            <button class="tab-btn" data-target="to-read">Want to Read</button>
            <button class="tab-btn" data-target="currently-reading">Currently Reading</button>
            <button class="tab-btn" data-target="scanner">Scanner</button>
            <div class="tab-indicator"></div>
        </nav>

        <main id="content-area">
            <div id="loading-spinner" class="hidden">
                <div class="spinner"></div>
                <p>Syncing your library...</p>
            </div>

            <div id="error-message" class="hidden error-card"></div>

            <div id="books-container" class="grid-container">
                <!-- Book cards will be injected here -->
            </div>

            <div id="scanner-container" class="hidden" style="text-align: center; padding: 20px;">
                <label for="camera-input" class="primary-btn"
                    style="display: inline-block; cursor: pointer; margin-bottom: 20px;">
                    Take/Upload Photo of Bookshelf
                </label>
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden"
                    style="display: none;">
                <div id="ocr-status" class="text-secondary" style="margin-bottom: 10px;"></div>
                <img id="scanner-preview" class="hidden"
                    style="max-width: 100%; border-radius: var(--border-radius); margin-bottom: 20px;">
                <div id="scanner-results" class="grid-container"></div>
            </div>
        </main>
    </div>

    <!-- Modal for Recommendations -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <header class="modal-header">
                <h2 id="modal-title">Recommendations</h2>
                <button id="close-modal-btn" class="icon-btn"
                    style="width: 32px; height: 32px; font-size: 1.2rem;">&times;</button>
            </header>
            <div id="modal-body" class="grid-container" style="max-height: 60vh; overflow-y: auto; padding-top: 10px;">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
